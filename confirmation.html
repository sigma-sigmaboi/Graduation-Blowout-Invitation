<!DOCTYPE html>
<html lang="en">
<head>
<!-- Social preview (link image + title) -->
<meta property="og:title" content="Graduation Blowout Invitation">
<meta property="og:description" content="You're invited to celebrate our graduation!">
<meta property="og:image" content="https://sigma-sigmaboi.github.io/Graduation-Blowout-Invitation-of-Yvene-and-Albrecht/invited.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sigma-sigmaboi.github.io/Graduation-Blowout-Invitation-of-Yvene-and-Albrecht/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Confirmation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    background:
        radial-gradient(circle at top, #fff7df, #f6ead2 60%, #ecd7b0);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{

width:100%;

max-width:430px;

background:rgba(255,255,255,0.75);

backdrop-filter: blur(10px);

border-radius:28px;

padding:30px 22px;

box-shadow:0 20px 60px rgba(0,0,0,.15);

overflow:hidden;

position:relative;


display:flex;
flex-direction:column;
min-height:90vh;

}

.glow{
    position:absolute;
    width:220px;
    height:220px;
    background:#f7d58a;
    filter:blur(90px);
    opacity:.45;
    top:-100px;
    right:-80px;
}

.title{
    position:relative;
    text-align:center;
}

.small{
    color:#a67c00;
    font-size:14px;
    letter-spacing:3px;
    text-transform:uppercase;
}

.title h1{
    margin-top:10px;
    font-size:34px;
    color:#4f3b12;
}

.subtitle{
    color:#6c624d;
    margin-top:10px;
    line-height:1.5;
}

.photos{
    display:flex;
    gap:14px;
    margin:30px 0;
}

.person{
    flex:1;
    text-align:center;
}

.image{
    width:100%;
    aspect-ratio:1/1;
    border-radius:20px;
    overflow:hidden;
    background:#eee;
    border:4px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    margin-top:10px;
    color:#5c4824;
	font-size: 16px;
}

.message{
    background:white;
    padding:20px;
    border-radius:18px;
    line-height:1.8;
    color:#4b4b4b;
    box-shadow:0 8px 20px rgba(0,0,0,.06);
}

.message h3{
    color:#7d5b00;
    margin-bottom:10px;
}

.details{
    margin-top:24px;
    text-align:center;
    color:#5e5746;
}

.details p{
    margin:6px 0;
}

.button{
    display:block;
    text-align:center;
    margin-top:28px;
}

button{
    border:none;
    padding:14px 26px;
    border-radius:999px;

    background:
        linear-gradient(
            135deg,
            #b8902c,
            #f0cb6b
        );

    color:white;
    font-size:16px;
    cursor:pointer;

    box-shadow:
        0 10px 30px rgba(184,144,44,.3);

    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.footer{

text-align:center;

margin-top:auto;

color:#7f735a;

font-size:13px;

padding-top:20px;

}

@media(max-width:430px){

.title h1{
    font-size:28px;
}

.message{
    font-size:15px;
}

}
/* Input section */

.input-box{

margin-top:22px;

display:flex;

flex-direction:column;

align-items:center;

}

.input-box label{

display:block;

margin-bottom:10px;

color:#7d5b00;

font-size:14px;

letter-spacing:1px;

text-align:center;

}

.input-box input{

width:100%;

max-width:330px;

padding:18px 22px;

border-radius:18px;

border:2px solid
rgba(240,203,107,.35);

background:
rgba(255,255,255,.85);

color:#4f3b12;

font-size:18px;

outline:none;

transition:.3s;

box-shadow:
0 10px 25px
rgba(0,0,0,.06);

}

}

.input-box input::placeholder{

```
color:#b39c68;
```

}

.input-box input:focus{

```
border-color:#d9ae42;

box-shadow:
    0 0 0 5px
    rgba(240,203,107,.18),

    0 12px 30px
    rgba(184,144,44,.18);

transform:
    translateY(-1px);
```

}

</style>
</head>

<body>

<div class="card">
<div class="input-box">

<label>
Enter your name to confirm attendance
</label>

<input
type="text"
id="guestName"
placeholder="Enter name">

</div>


<div class="button">
<button id="rsvpBtn" onclick="showMessage()">
Confirm
</button>
</div>

<div class="footer">
Made by Jim Albrecht Cadion
</div>

</div>

<script>

async function showMessage() {

  const btn = document.getElementById("rsvpBtn");
  const input = document.getElementById("guestName");

  if (btn && btn.disabled) return;

  const name = input.value;

  if (!name || name.trim() === "") {
    alert("Please enter your name to confirm attendance.");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Confirming...";

  try {

    await fetch(
      "https://script.google.com/macros/s/AKfycbweHjnsTLFLP6imgjE2V4r_Rvbg4VyExt_cmQrEaMOr8GSvdQGM7h8H3l7bNhxDYCd9/exec",
      {
        method: "POST",
        body: JSON.stringify({ name: name.trim() })
      }
    );

    alert("Attendance confirmed 🎓 See you there!");

    btn.innerText = "Confirmed ✔";

    // optional: lock input too
    input.disabled = true;

  } catch (err) {

    alert("Unable to confirm. Please try again.");

    btn.disabled = false;
    btn.innerText = "Confirm Attendance";
  }
}
</script>

</body>
</html>
